<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audiofy - Converter Vídeo para MP3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0B0E14; color: #E2E8F0; font-family: 'Inter', sans-serif; }
        .neon-shadow:focus { box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }

        /* Toast de erro */
        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #1e1e2e;
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 0.75rem 1.5rem;
            border-radius: 999px;
            font-size: 0.875rem;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            z-index: 50;
            white-space: nowrap;
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto w-full">
        <h1 class="text-2xl font-bold tracking-tighter text-white">AUDIO<span class="text-violet-500">FY</span></h1>
        <div class="space-x-6 text-sm text-slate-400">
            <a href="#" class="hover:text-violet-400 transition">Termos</a>
            <a href="#" class="bg-violet-600 text-white px-4 py-2 rounded-full hover:bg-violet-700 transition">Premium</a>
        </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center px-4 -mt-16">
        <div class="max-w-3xl w-full text-center space-y-8">
            <div>
                <h2 class="text-5xl font-bold text-white mb-4">Música sem limites.</h2>
                <p class="text-slate-400 text-lg">Cole o link do YouTube ou TikTok e baixe em MP3 instantaneamente.</p>
            </div>

            <!-- Input Area -->
            <div class="relative group">
                <input id="urlInput" type="text" placeholder="Cole a URL do vídeo aqui..."
                    class="w-full bg-[#1E293B] border border-slate-700 p-6 rounded-3xl text-white outline-none neon-shadow transition-all text-lg pr-40">
                <button onclick="analyzeVideo()" id="btnAction"
                    class="absolute right-2 top-2 bottom-2 bg-violet-600 hover:bg-violet-700 text-white px-8 rounded-2xl font-semibold transition-all flex items-center gap-2">
                    Converter
                </button>
            </div>

            <!-- Result Card (Hidden by default) -->
            <div id="resultCard" class="hidden glass border border-slate-700 p-6 rounded-3xl text-left animate-in fade-in zoom-in duration-300">
                <div class="flex flex-col md:flex-row gap-6">
                    <img id="thumb" src="" alt="Thumbnail do vídeo" class="w-full md:w-48 h-28 object-cover rounded-xl shadow-2xl">
                    <div class="flex-grow">
                        <h3 id="videoTitle" class="text-xl font-bold text-white truncate max-w-md">Título do Vídeo</h3>
                        <p id="duration" class="text-slate-400 text-sm mb-4">Duração: 00:00</p>

                        <div class="flex items-center gap-4">
                            <select id="quality" class="bg-slate-800 border border-slate-600 rounded-lg p-2 text-sm outline-none text-white">
                                <option value="128">128kbps</option>
                                <option value="192" selected>192kbps (Padrão)</option>
                                <option value="320">320kbps (Alta)</option>
                            </select>
                            <button onclick="startDownload()" id="btnDownload"
                                class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold transition flex-grow">
                                Baixar MP3
                            </button>
                        </div>

                        <!-- Barra de progresso do download -->
                        <div id="downloadStatus" class="hidden mt-3 text-sm text-slate-400 flex items-center gap-2">
                            <div class="w-4 h-4 border-2 border-violet-500/30 border-t-violet-500 rounded-full animate-spin"></div>
                            <span>Preparando download...</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Loader -->
            <div id="loader" class="hidden flex flex-col items-center gap-3">
                <div class="w-12 h-12 border-4 border-violet-500/20 border-t-violet-500 rounded-full animate-spin"></div>
                <p class="text-sm text-slate-400 animate-pulse">Analisando link...</p>
            </div>
        </div>
    </main>

    <!-- Toast de erro (substitui alert()) -->
    <div id="toast"></div>

    <footer class="p-8 text-center text-slate-500 text-xs">
        <p>© <span id="year"></span> Audiofy. Use com responsabilidade. Respeite os direitos autorais.</p>
    </footer>

    <script src="script.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
